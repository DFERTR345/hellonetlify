<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>걸음 측정</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0; padding: 0; box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }
    body {
      background: linear-gradient(to right, #c2e9fb, #a1c4fd);
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 1rem;
      overflow: hidden;
    }
    .card {
      background: white;
      border-radius: 2rem;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      padding: 2rem;
      width: 90%;
      max-width: 400px;
      text-align: center;
      position: relative;
      z-index: 2;
    }
    .card h1 {
      font-size: 2rem;
      margin-bottom: 1rem;
    }
    .input-group {
      margin: 1rem 0;
    }
    input {
      width: 100%;
      padding: 0.75rem;
      font-size: 1rem;
      border: 2px solid #ddd;
      border-radius: 1rem;
    }
    button {
      background: #4facfe;
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      font-size: 1rem;
      border-radius: 1rem;
      cursor: pointer;
      transition: 0.3s;
      margin: 0.5rem;
    }
    button:hover {
      background: #00f2fe;
    }
    .stats {
      margin-top: 1rem;
      font-size: 1.2rem;
    }
    .walker {
      position: absolute;
      bottom: 0;
      left: -100px;
      width: 100px;
      animation: walk 10s linear infinite;
      z-index: 1;
    }
    @keyframes walk {
      0% { left: -100px; }
      100% { left: 100vw; }
    }
    .shop {
      margin-top: 2rem;
      text-align: center;
    }
    .reward-item {
      background: #fff7e6;
      border: 2px solid #ffd27f;
      border-radius: 1rem;
      margin: 1rem auto;
      padding: 1rem;
      width: 90%;
    }
  </style>
</head>
<body>
  <img src="https://cdn.pixabay.com/animation/2023/10/30/14/40/14-40-05-944_512.gif" class="walker" alt="걷는 고양이">

  <div class="card">
    <h1>걸음 측정</h1>
    <div class="input-group">
      <label for="steps">오늘의 걸음 수</label>
      <input type="number" id="steps" placeholder="걸음 수 입력...">
    </div>
    <button onclick="addSteps()">포인트 적립</button>
    <button onclick="toggleSensor()">센서로 측정</button>
    <div class="stats">
      총 걸음 수: <span id="totalSteps">0</span><br>
      보유 포인트: <span id="points">0</span><br>
      센서 상태: <span id="sensorStatus">OFF</span>
    </div>
  </div>

  <div class="shop">
    <h2>리워드 상점</h2>
    <div class="reward-item">
      <p>귀여운 배경 이미지 (500P)</p>
      <button onclick="redeemReward(500, '귀여운 배경')">구매</button>
    </div>
    <div class="reward-item">
      <p>고양이 캐릭터 언락 (1000P)</p>
      <button onclick="redeemReward(1000, '고양이 캐릭터')">구매</button>
    </div>
  </div>

  <script>
    let totalSteps = parseInt(localStorage.getItem('steps')) || 0;
    let points = parseInt(localStorage.getItem('points')) || 0;
    let sensorActive = false;
    let stepBuffer = 0;
    let lastAccel = { x: 0, y: 0, z: 0 };
    let stepThreshold = 12;

    document.getElementById('totalSteps').textContent = totalSteps;
    document.getElementById('points').textContent = points;

    function addSteps() {
      const input = document.getElementById('steps');
      const newSteps = parseInt(input.value) || 0;
      updateStats(newSteps);
      input.value = '';
    }

    function updateStats(stepsToAdd) {
      totalSteps += stepsToAdd;
      const addedPoints = Math.floor(stepsToAdd / 100);
      points += addedPoints;
      localStorage.setItem('steps', totalSteps);
      localStorage.setItem('points', points);
      document.getElementById('totalSteps').textContent = totalSteps;
      document.getElementById('points').textContent = points;
    }

    function toggleSensor() {
      sensorActive = !sensorActive;
      document.getElementById('sensorStatus').textContent = sensorActive ? 'ON' : 'OFF';
    }

    function redeemReward(cost, name) {
      if (points >= cost) {
        points -= cost;
        localStorage.setItem('points', points);
        document.getElementById('points').textContent = points;
        alert(`${name}를 성공적으로 구매했습니다!`);
      } else {
        alert('포인트가 부족합니다.');
      }
    }

    if (window.DeviceMotionEvent) {
      window.addEventListener('devicemotion', (event) => {
        if (!sensorActive) return;
        const acc = event.accelerationIncludingGravity;
        const magnitude = Math.sqrt(
          acc.x * acc.x + acc.y * acc.y + acc.z * acc.z
        );

        const lastMag = Math.sqrt(
          lastAccel.x * lastAccel.x + lastAccel.y * lastAccel.y + lastAccel.z * lastAccel.z
        );

        const delta = Math.abs(magnitude - lastMag);

        if (delta > stepThreshold) {
          stepBuffer++;
          if (stepBuffer >= 5) {
            updateStats(1);
            stepBuffer = 0;
          }
        }
        lastAccel = acc;
      });
    }
  </script>
</body>
</html>
